; ============================================================
; PHP-FPM Pool: www
; Configura PHP-FPM para usar Unix socket (igual que docs Laravel)
; ============================================================

[www]

; Usuario y grupo con el que corre PHP-FPM
user  = appuser
group = appgroup

; --- Socket Unix (en vez del TCP 127.0.0.1:9000 por defecto) ---
listen = /var/run/php/php8.3-fpm.sock

; Permisos del socket - Nginx (mismo usuario) necesita rw
listen.owner = appuser
listen.group = appgroup
listen.mode  = 0666

; Modo de gestión de procesos
pm = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests      = 500

; Logs a stdout/stderr (compatible con Docker)
catch_workers_output         = yes
decorate_workers_output      = no
php_admin_value[error_log]   = /dev/stderr
php_admin_flag[log_errors]   = on

; Deshabilitar funciones peligrosas en producción
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,popen,proc_open
