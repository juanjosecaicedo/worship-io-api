server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /var/www/html/public;

    # Cabeceras de seguridad recomendadas por Laravel
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Logs a stdout/stderr para Docker
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Tamaño máximo del body (alineado con php.ini)
    client_max_body_size 12M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Laravel maneja los 404 desde index.php
    error_page 404 /index.php;

    # PHP-FPM via socket Unix (igual que docs oficiales de Laravel)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Bloquear acceso a archivos ocultos excepto .well-known
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
